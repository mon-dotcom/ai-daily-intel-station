name: Daily AI Intel Update

on:
  schedule:
    - cron: "7 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Update Markdown content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_CUSTOM }}
          WECHAT_RSS_FEEDS: ${{ secrets.WECHAT_RSS_FEEDS }}
          WECHAT_RSS_ORIGIN_URL: ${{ secrets.WECHAT_RSS_ORIGIN_URL }}
          WECHAT_RSS_FEED_IDS: ${{ secrets.WECHAT_RSS_FEED_IDS }}
          WECHAT_RSS_DISCOVERY_INCLUDE: ${{ secrets.WECHAT_RSS_DISCOVERY_INCLUDE }}
          WECHAT_RSS_DISCOVERY_EXCLUDE: ${{ secrets.WECHAT_RSS_DISCOVERY_EXCLUDE }}
          WECHAT_RSS_LIMIT: ${{ secrets.WECHAT_RSS_LIMIT }}
        run: npm run update:content

      - name: Generate static page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_CUSTOM }}
        run: npm run build:page

      - name: Commit updated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/*.md index.html src/data/github-snapshot.json src/data/monthly-tools-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update daily AI intel"
          git push

name: Daily AI Intel Monitor

on:
  schedule:
    - cron: "7 2 * * *"
  workflow_dispatch:

concurrency:
  group: daily-ai-intel-monitor
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify production site updated today
        env:
          PRODUCTION_SITE_URL: https://skill-deploy-gynq2anyfj.vercel.app
        run: npm run monitor:production

  notify-failure:
    runs-on: ubuntu-latest
    needs: monitor
    if: ${{ failure() }}
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily AI Intel Monitor failed on ${new Date().toISOString().slice(0, 10)}`
            const body = [
              "The scheduled workflow `Daily AI Intel Monitor` failed.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run ID: ${context.runId}`,
              `- Run URL: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Trigger: ${context.eventName}`,
              `- Commit: ${context.sha}`,
              "",
              "Please inspect the workflow logs and rerun the job if needed."
            ].join("\n")

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            })

            const existing = issues.find((issue) => issue.title === title)
            if (existing) {
              core.info(`Failure issue already exists: #${existing.number}`)
              return
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            })
